<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ - 星の導き</title>
  <meta name="description" content="星の導きへのお問い合わせページです。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0e1a;
      --surface: #121625;
      --card: #1a1e2e;
      --accent: #7ee8ff;
      --gold: #e8c96a;
      --text: #f0eede;
      --muted: #b0aec8;
      --border: #3a3a5a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #0a0e1a;
      background-image: url('bg.jpg');
      background-attachment: scroll;
      background-size: cover;
      background-position: center center;
      color: var(--text);
      font-family: 'Shippori Mincho', 'Hiragino Mincho ProN', 'Yu Mincho', serif;
      min-height: 100vh;
      line-height: 1.85;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(5, 8, 20, 0.80);
      z-index: 0;
      pointer-events: none;
    }

    header {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 40px 20px 20px;
      background: linear-gradient(180deg, #0a0a1a 0%, transparent 100%);
    }

    header h1 {
      font-size: 1.6rem;
      color: var(--gold);
      letter-spacing: 0.1em;
    }

    header p {
      margin-top: 8px;
    }

    header a {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.9rem;
    }

    header a:hover { text-decoration: underline; }

    main {
      position: relative;
      z-index: 1;
      max-width: 640px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }

    .card {
      background: rgba(26, 30, 46, 0.92);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px;
    }

    .card p {
      font-size: 0.95rem;
      color: var(--muted);
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 0.9rem;
      color: var(--text);
      margin-bottom: 6px;
    }

    input, textarea, select {
      width: 100%;
      padding: 12px 14px;
      background: rgba(10, 14, 26, 0.8);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      margin-bottom: 20px;
      outline: none;
      transition: border 0.2s;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--accent);
    }

    textarea {
      height: 140px;
      resize: vertical;
    }

    button[type="submit"] {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #2a5fa8, #1a3a6a);
      border: 1px solid var(--accent);
      border-radius: 30px;
      color: #ffffff;
      font-family: inherit;
      font-size: 1rem;
      cursor: pointer;
      letter-spacing: 0.1em;
      transition: all 0.25s;
    }

    button[type="submit"]:hover {
      background: linear-gradient(135deg, #3a6fc0, #2a4a80);
    }

    .success {
      display: none;
      text-align: center;
      padding: 20px;
      color: var(--accent);
      font-size: 1rem;
    }

    footer {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 30px;
      color: #ffffff;
      font-size: 1rem;
      background: #1a1e2e;
      border-top: 2px solid #7ee8ff;
    }

    footer a {
      color: #7ee8ff;
      text-decoration: underline;
    }
  </style>
</head>
<body>

<div class="overlay"></div>

<header>
  <h1>お問い合わせ</h1>
  <p><a href="index.html">← 星の導き トップへ戻る</a></p>
</header>

<main>
  <div class="card">
    <p>ご質問・ご意見・不具合のご報告など、お気軽にお問い合わせください。通常2〜3営業日以内にご返信いたします。</p>

    <form action="https://formspree.io/f/mbdqjrro" method="POST">
      <label for="name">お名前</label>
      <input type="text" id="name" name="name" placeholder="山田 太郎" required>

      <label for="email">メールアドレス</label>
      <input type="email" id="email" name="email" placeholder="example@email.com" required>

      <label for="category">お問い合わせ種別</label>
      <select id="category" name="category">
        <option value="general">一般的なご質問</option>
        <option value="bug">不具合の報告</option>
        <option value="suggestion">ご意見・ご要望</option>
        <option value="other">その他</option>
      </select>

      <label for="message">お問い合わせ内容</label>
      <textarea id="message" name="message" placeholder="お問い合わせ内容をご記入ください。" required></textarea>

      <button type="submit">送信する</button>
    </form>
  </div>
</main>

<footer>
  <p>© 2026 星の導き — 占い結果はエンターテインメント目的です</p>
  <p style="margin-top: 8px;">
    <a href="privacy.html">プライバシーポリシー</a>
    　｜
    <a href="contact.html">お問い合わせ</a>
  </p>
</footer>

</body>
</html>
